<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
   <body class="bg-light">

<div class="container mt-5">

    <!-- Top Bar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Welcome, {{ data.name }}</h4>
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>

    <!-- Card -->
    <div class="card shadow p-4">
        <h3 class="text-center mb-4">Proceed to Payment</h3>

        <form action="{% url 'pay_amount' pk=item_detail.id %}" method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Item Name</label>
                <input type="text" class="form-control" value="{{ item_detail.item_name }}" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Item Price</label>

                {% if not payment %}
                <input type="number" class="form-control" value="{{ item_detail.item_price }}" readonly>
                {% else %}
                <input type="number" class="form-control" value="{{ amount }}" readonly>
                {% endif %}

            </div>

            <button type="submit" class="btn btn-primary w-100">
                Generate Order
            </button>
        </form>

        <br>


        
        {% if payment %}
        <form action="{% url 'pay_status' pk=item_detail.id %}" method="post" class="title">
            {% csrf_token %}
            <script src="https://checkout.razorpay.com/v1/checkout.js" 
            data-key="rzp_test_pr99iascS1WRtU"
            data-amount="{{ payment.amount }}"
            data-currency="{{ payment.currency }}" 
            data-order_id="{{ payment.id }}"
            data-buttontext="Pay with Razorpay"
            data-name="Neeraj Ecom" 
            data-description="Thanku for visiting My Site"
            data-image="https://example.com/your_logo.jpg" 
            data-prefill.name="Neeraj Kumar"
            data-prefill.email="Neeraj.Patel@gmail.com" 
            data-theme.color="#2520adff">
        </script>
            <input type="hidden" custom="Hidden Element" name="hidden">
        </form>
            
        {% endif %}
            
    </div>

</body>
</html>
