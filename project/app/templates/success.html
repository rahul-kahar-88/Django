<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card shadow-lg text-center p-5" style="max-width: 500px; width:100%;">
        
        <!-- Success Icon -->
        <div class="mb-4">
            <div class="bg-success text-white rounded-circle d-inline-flex justify-content-center align-items-center" style="width:80px; height:80px; font-size:40px;">
                ✓
            </div>
        </div>

        <!-- Title -->
        <h2 class="text-success mb-3">Payment Successful</h2>

        <!-- Message -->
        <p class="text-muted">
            Thank you for your purchase! Your payment has been successfully processed.
        </p>

        <hr>

        <!-- Order Details -->
        <div class="text-start">
            <p><strong>Order ID : </strong> {{ order.order_id }}</p>
            <p><strong>Payment ID : </strong> {{ order.razorpay_id }}</p>
            <p><strong>Amount Paid : </strong> ₹{{ order.amount }}</p>
        </div>

        <hr>

        <!-- Buttons -->
        <div class="d-grid gap-2">
            <a href="/" class="btn btn-primary">Go to Home</a>
           
        </div>

    </div>

</div>

</body>
</html>
